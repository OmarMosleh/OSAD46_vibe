<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main container - holds everything together like a good friendship -->
    <div class="container">
        
        <!-- Header section - where we show off our app's purpose -->
        <header>
            <h1>Sorting Algorithm Visualizer</h1>
            <p>Watch sorting algorithms come to life with colorful animations!</p>
        </header>

        <!-- Controls panel - the command center for our visualization -->
        <div class="controls-panel">
            
            <!-- Algorithm selection - pick your favorite sorting method -->
            <div class="control-group">
                <label for="algorithm-select">Algorithm:</label>
                <select id="algorithm-select">
                    <option value="bubble">Bubble Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="merge">Merge Sort</option>
                    <option value="quick">Quick Sort</option>
                    <option value="heap">Heap Sort</option>
                </select>
            </div>

            <!-- Array size control - how many bars do you want to sort? -->
            <div class="control-group">
                <label for="array-size">Array Size:</label>
                <input type="number" id="array-size" min="5" max="100" value="50">
            </div>

            <!-- Speed control - go slow for learning, go fast for showing off -->
            <div class="control-group">
                <label for="speed-slider">Speed:</label>
                <input type="range" id="speed-slider" min="1" max="100" value="50">
                <span id="speed-value">50</span>
            </div>

            <!-- Array generation buttons - create your data -->
            <div class="control-group">
                <button id="generate-btn" class="btn btn-secondary">Generate Random</button>
                <button id="custom-input-btn" class="btn btn-secondary">Custom Input</button>
            </div>

            <!-- Action buttons - start the magic! -->
            <div class="control-group">
                <button id="start-btn" class="btn btn-primary">Start Sorting</button>
                <button id="stop-btn" class="btn btn-danger" disabled>Stop</button>
            </div>

        </div>

        <!-- Custom input section - hidden by default, appears when needed -->
        <div id="custom-input-section" class="custom-input-section hidden">
            <label for="custom-array-input">Enter numbers separated by commas (e.g., 5, 10, 3, 8):</label>
            <input type="text" id="custom-array-input" placeholder="5, 10, 3, 8, 15, 1">
            <button id="apply-custom-btn" class="btn btn-secondary">Apply</button>
            <button id="cancel-custom-btn" class="btn btn-secondary">Cancel</button>
        </div>

        <!-- Algorithm info panel - shows what's happening -->
        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">Algorithm:</span>
                <span id="current-algorithm">Bubble Sort</span>
            </div>
            <div class="info-item">
                <span class="info-label">Time Complexity:</span>
                <span id="time-complexity">O(n²)</span>
            </div>
            <div class="info-item">
                <span class="info-label">Comparisons:</span>
                <span id="comparison-count">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Swaps:</span>
                <span id="swap-count">0</span>
            </div>
        </div>

        <!-- Visualization container - where the magic happens! -->
        <div id="visualization-container" class="visualization-container">
            <!-- Bars will be dynamically created here by JavaScript -->
        </div>

    </div>

    <!-- Load our JavaScript modules - order matters, like pancakes in a stack -->
    <script src="js/sortingAlgorithms.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
